<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.png">
<title>Auditor Externo — n.iso | ness.</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#070b14;color:#f5f5f7;font-family:'Inter',sans-serif;font-weight:400;line-height:1.6;min-height:100vh}
h1,h2,h3{font-family:'Montserrat',sans-serif;font-weight:500;text-transform:lowercase}
h1{font-size:1.5rem}h2{font-size:1.15rem;margin-bottom:.75rem}h3{font-size:1rem}
a{color:#00ade8;text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:1.5rem}
/* banner */
.banner{background:rgba(0,173,232,.08);border:1px solid rgba(0,173,232,.25);border-radius:16px;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.banner h1{color:#00ade8;margin:0}
.banner .expires{font-size:.85rem;color:rgba(229,235,255,.6)}
/* logo */
.logo{font-family:'Montserrat',sans-serif;font-weight:500;font-size:1.4rem;margin-bottom:1.5rem}
.logo .dot{color:#00ade8}
/* card */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:1.25rem 1.5rem;margin-bottom:1.25rem}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem}
.card-grid dt{font-size:.75rem;color:rgba(229,235,255,.6);font-weight:300;text-transform:uppercase;letter-spacing:.04em}
.card-grid dd{font-size:.95rem;margin:0 0 .25rem}
/* table */
table{width:100%;border-collapse:collapse;font-size:.9rem}
th{text-align:left;font-family:'Montserrat',sans-serif;font-weight:500;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;color:rgba(229,235,255,.6);padding:.6rem .5rem;border-bottom:1px solid rgba(255,255,255,.08)}
td{padding:.6rem .5rem;border-bottom:1px solid rgba(255,255,255,.04)}
/* badges */
.badge{display:inline-block;padding:.15rem .6rem;border-radius:999px;font-size:.75rem;font-weight:400;line-height:1.4}
.badge-completed{background:rgba(52,199,89,.15);color:#34c759}
.badge-in_progress{background:rgba(255,204,0,.15);color:#fc0}
.badge-pending{background:rgba(255,255,255,.08);color:rgba(229,235,255,.6)}
.badge-implemented{background:rgba(52,199,89,.15);color:#34c759}
.badge-partial{background:rgba(255,204,0,.15);color:#fc0}
.badge-not_implemented{background:rgba(255,69,58,.12);color:#ff453a}
/* evidence list */
.ev-item{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ev-item:last-child{border-bottom:none}
.ev-name{font-weight:400}.ev-meta{font-size:.8rem;color:rgba(229,235,255,.6)}
/* footer */
footer{text-align:center;padding:2rem 0 1rem;font-size:.8rem;color:rgba(229,235,255,.6)}
footer .ness{color:#f5f5f7;font-family:'Montserrat',sans-serif;font-weight:500}
footer .ness .dot{color:#00ade8}
/* states */
.msg{text-align:center;padding:4rem 1rem;font-size:1rem;color:rgba(229,235,255,.6)}
.msg.error{color:#ff453a}
.loading-pulse{animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
/* print */
@media print{
  body{background:#fff;color:#111}
  .card{background:#f8f8f8;border-color:#ddd;backdrop-filter:none}
  .banner{background:#e8f7fc;border-color:#00ade8}
  .badge{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  footer{page-break-before:avoid}
}
/* responsive */
@media(max-width:600px){
  .container{padding:1rem}
  .banner{flex-direction:column;align-items:flex-start}
  .card-grid{grid-template-columns:1fr}
  table{font-size:.8rem}
  th,td{padding:.5rem .3rem}
}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="msg loading-pulse" id="loading">Carregando dados do projeto...</div>
</div>

<script>
(function(){
  var token = new URLSearchParams(location.search).get('token');
  var app = document.getElementById('app');

  if (!token) { showError('Token invalido ou expirado'); return; }

  fetch('/api/v1/auditor/' + encodeURIComponent(token) + '/project')
    .then(function(r){ if (!r.ok) throw r; return r.json(); })
    .then(function(d){ render(d.data || d); })
    .catch(function(){ showError('Token invalido ou expirado'); });

  function showError(msg) {
    app.innerHTML = '<div class="logo">n<span class="dot">.</span>ISO</div>' +
      '<div class="msg error">' + esc(msg) + '</div>' +
      '<footer>Powered by <span class="ness">ness<span class="dot">.</span></span> | Acesso temporario read-only</footer>';
  }

  function esc(s){ var d=document.createElement('div');d.textContent=s;return d.innerHTML; }

  function fmtDate(s){
    if(!s) return '—';
    var d=new Date(s);
    return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}) +
      ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }

  function badge(status){
    var cls = 'badge badge-' + (status||'pending').toLowerCase().replace(/ /g,'_');
    return '<span class="'+cls+'">' + esc(status||'pending') + '</span>';
  }

  function render(p) {
    var phases = p.phases || [];
    var controls = p.controls || [];
    var evidence = p.evidence || [];
    var risks = p.risks || [];
    var ropa = p.ropa || [];
    var gap = p.gap_summary || {};

    var html = '<div class="logo">n<span class="dot">.</span>ISO</div>';

    // banner
    html += '<div class="banner"><h1>acesso de auditor externo</h1>';
    html += '<span class="expires">Expira em: ' + fmtDate(p.token_expires_at) + '</span></div>';

    // project info
    html += '<div class="card"><h2>projeto</h2><dl class="card-grid">';
    html += '<div><dt>Cliente</dt><dd>'+esc(p.client_name||p.project?.client_name||'—')+'</dd></div>';
    html += '<div><dt>Setor</dt><dd>'+esc(p.sector||p.project?.sector||'—')+'</dd></div>';
    html += '<div><dt>Escopo</dt><dd>'+esc(p.scope||p.project?.scope||'—')+'</dd></div>';
    html += '<div><dt>Normas</dt><dd>'+esc((Array.isArray(p.standards)?p.standards.join(', '):p.standards)||p.project?.standards||'—')+'</dd></div>';
    html += '<div><dt>Status</dt><dd>'+badge(p.status||p.project?.status)+'</dd></div>';
    html += '</dl></div>';

    // gap summary
    if (gap.total) {
      var barColor = gap.coverage_pct > 80 ? '#22c55e' : gap.coverage_pct > 50 ? '#f59e0b' : '#ef4444';
      html += '<div class="card"><h2>cobertura de controles</h2>';
      html += '<div style="display:flex;align-items:center;gap:1rem;margin-bottom:0.5rem">';
      html += '<div style="font-size:2rem;font-weight:700;color:'+barColor+'">'+gap.coverage_pct+'%</div>';
      html += '<div style="flex:1"><div style="height:8px;background:#1a1f2e;border-radius:4px;overflow:hidden"><div style="width:'+gap.coverage_pct+'%;height:100%;background:'+barColor+';border-radius:4px"></div></div></div></div>';
      html += '<div style="font-size:0.75rem;color:#999">'+gap.implemented+' implementados de '+gap.total+' controles</div></div>';
    }

    // phases
    if (phases.length) {
      html += '<div class="card"><h2>fases do projeto</h2><table><thead><tr>';
      html += '<th>#</th><th>Titulo</th><th>Status</th></tr></thead><tbody>';
      phases.forEach(function(ph){
        html += '<tr><td>'+esc(String(ph.phase_number||''))+'</td>';
        html += '<td>'+esc(ph.title||'')+'</td>';
        html += '<td>'+badge(ph.status)+'</td></tr>';
      });
      html += '</tbody></table></div>';
    }

    // controls
    if (controls.length) {
      html += '<div class="card"><h2>controles</h2><table><thead><tr>';
      html += '<th>ID</th><th>Titulo</th><th>Status</th></tr></thead><tbody>';
      controls.forEach(function(c){
        html += '<tr><td>'+esc(c.id||'')+'</td>';
        html += '<td>'+esc(c.title||'')+'</td>';
        html += '<td>'+badge(c.status)+'</td></tr>';
      });
      html += '</tbody></table></div>';
    }

    // risks
    if (risks.length) {
      html += '<div class="card"><h2>riscos identificados ('+risks.length+')</h2><table><thead><tr>';
      html += '<th>Risco</th><th>Probabilidade</th><th>Impacto</th><th>Nivel</th><th>Tratamento</th></tr></thead><tbody>';
      risks.forEach(function(r){
        var riskColor = r.risk_level === 'critical' ? '#ef4444' : r.risk_level === 'high' ? '#f59e0b' : r.risk_level === 'medium' ? '#eab308' : '#22c55e';
        html += '<tr><td>'+esc(r.title||'')+'</td>';
        html += '<td>'+esc(String(r.likelihood||''))+'</td>';
        html += '<td>'+esc(String(r.impact||''))+'</td>';
        html += '<td style="color:'+riskColor+';font-weight:600">'+esc(r.risk_level||'')+'</td>';
        html += '<td>'+esc(r.treatment||'')+'</td></tr>';
      });
      html += '</tbody></table></div>';
    }

    // ropa
    if (ropa.length) {
      html += '<div class="card"><h2>ROPA — registro de atividades de tratamento ('+ropa.length+')</h2><table><thead><tr>';
      html += '<th>Processo</th><th>Finalidade</th><th>Base Legal</th><th>Retencao</th></tr></thead><tbody>';
      ropa.forEach(function(r){
        html += '<tr><td>'+esc(r.process_name||'')+'</td>';
        html += '<td>'+esc(r.purpose||'')+'</td>';
        html += '<td>'+esc(r.legal_basis||'')+'</td>';
        html += '<td>'+esc(r.retention_period||'')+'</td></tr>';
      });
      html += '</tbody></table></div>';
    }

    // evidence
    if (evidence.length) {
      html += '<div class="card"><h2>evidencias</h2>';
      evidence.forEach(function(e){
        html += '<div class="ev-item"><span class="ev-name">'+esc(e.file_name||'')+'</span>';
        html += '<div style="display:flex;align-items:center;gap:1rem">';
        html += '<span class="ev-meta">'+esc(e.file_type||'')+' — '+esc(e.uploaded_by||'')+' — '+fmtDate(e.created_at)+'</span>';
        html += '<a href="/api/v1/auditor/' + encodeURIComponent(token) + '/evidence/' + e.id + '/download" style="color:#00ade8;font-weight:600;font-size:0.85rem">Download</a>';
        html += '</div></div>';
      });
      html += '</div>';
    }

    // collaboration
    html += '<div class="card"><h2>Notas e Pedidos de Evidência</h2>';
    html += '<div id="notes-container" style="margin-bottom:1rem;display:flex;flex-direction:column;gap:12px">Carregando notas...</div>';
    html += '<form id="note-form" onsubmit="window.submitNote(event)" style="margin-top:1rem;display:flex;flex-direction:column;gap:8px">';
    html += '<div style="display:grid;grid-template-columns:1fr 2fr;gap:8px">';
    html += '<select id="note-type" class="form-input" style="width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:8px 12px;color:#f5f5f7">';
    html += '<option value="question">Pergunta / Dúvida</option>';
    html += '<option value="evidence_request">Solicitação de Evidência</option>';
    html += '<option value="observation">Constatação / Observação</option>';
    html += '</select>';
    html += '<select id="note-control" class="form-input" style="width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:8px 12px;color:#f5f5f7">';
    html += '<option value="">-- Vincular a Controle (Opcional) --</option>';
    controls.forEach(function(c){
      html += '<option value="'+c.id+'">'+esc(c.standard || '')+' - '+esc(c.title || '')+'</option>';
    });
    html += '</select></div>';
    html += '<textarea id="note-content" class="form-input" required rows="3" placeholder="Deixe uma pergunta ou peça uma evidência..." style="width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:8px 12px;color:#f5f5f7;font-family:inherit"></textarea>';
    html += '<button type="submit" class="btn-primary" style="background:#00ade8;color:#070b14;border:none;border-radius:10px;padding:8px 16px;cursor:pointer;font-family:\'Montserrat\',sans-serif;font-weight:700;align-self:flex-end">Enviar Nota</button>';
    html += '</form></div>';

    // footer
    html += '<footer>Powered by <span class="ness">ness<span class="dot">.</span></span> | Portal do Auditor Externo</footer>';

    app.innerHTML = html;
    window.loadNotes();
  }

  window.loadNotes = function() {
    var container = document.getElementById('notes-container');
    if(!container) return;
    fetch('/api/v1/auditor/' + encodeURIComponent(token) + '/notes')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var notes = Array.isArray(d) ? d : (d.notes || []);
        if (notes.length === 0) {
          container.innerHTML = '<div style="font-size:0.8rem;color:rgba(229,235,255,0.6)">Nenhuma nota registrada nesta auditoria.</div>';
          return;
        }
        container.innerHTML = notes.map(function(n) {
          var typeLabel = n.note_type === 'question' ? 'Pergunta' : n.note_type === 'evidence_request' ? 'Pedido de Evidência' : 'Observação';
          var badgeColor = n.note_type === 'evidence_request' ? '#fc0' : n.note_type === 'observation' ? '#ff453a' : '#00ade8';
          return '<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);padding:12px;border-radius:10px;margin-bottom:8px">' +
            '<div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.75rem">' +
              '<span style="font-weight:600;color:'+badgeColor+'">'+typeLabel+'</span>' +
              '<span style="color:rgba(229,235,255,0.6)">'+esc(n.control_standard || 'Geral')+'</span>' +
            '</div>' +
            '<div style="font-size:0.85rem;margin-bottom:8px;color:#f5f5f7">'+esc(n.content)+'</div>' +
            (n.response ? 
              '<div style="margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,255,255,0.06);font-size:0.8rem;color:#34c759">' +
                '<strong>Resposta do Consultor:</strong> '+esc(n.response) +
              '</div>' : 
              '<div style="font-size:0.75rem;color:rgba(229,235,255,0.4);font-style:italic">Aguardando resposta...</div>') +
          '</div>';
        }).join('');
      });
  };

  window.submitNote = function(e) {
    e.preventDefault();
    var contentEl = document.getElementById('note-content');
    var typeEl = document.getElementById('note-type');
    var controlEl = document.getElementById('note-control');
    
    var body = {
      note_type: typeEl.value,
      control_id: controlEl.value || null,
      content: contentEl.value
    };
    
    fetch('/api/v1/auditor/' + encodeURIComponent(token) + '/notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.ok) {
        contentEl.value = '';
        window.loadNotes();
      }
    });
  };
})();
</script>
</body>
</html>
