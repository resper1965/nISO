name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: TypeScript Check
        run: npx tsc --noEmit
      - name: Build Frontend
        run: cd frontend && npm ci && npm run build
      - name: Run Tests
        run: npm test -- --run
